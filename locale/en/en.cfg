[mod-name]
blueprint-deconstruction-markers=Blueprint Deconstruction Markers

[mod-description]
blueprint-deconstruction-markers=Adds a marker for blueprints. When a blueprint containing markers is placed with super-force build, existing entities under the markers are marked for deconstruction and the marker ghosts remove themselves. Blueprints can now remove entities, not just add or replace them.

[shortcut-name]
bpdm-give-marker=Get deconstruction marker

[controls]
bpdm-give-marker=Get deconstruction marker

[item-name]
bpdm-deconstruction-marker=Deconstruction marker

[item-description]
bpdm-deconstruction-marker=Place in a blueprint on tiles whose entities should be removed. Stamp the blueprint with super-force build (Ctrl+Shift+Click).

[entity-name]
bpdm-deconstruction-marker=Deconstruction marker

[entity-description]
bpdm-deconstruction-marker=Place in a blueprint on tiles whose entities should be removed. Stamp the blueprint with super-force build (Ctrl+Shift+Click).
